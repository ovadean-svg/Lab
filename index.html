<!DOCTYPE html>
<html>
<head>
    <title>Ex 5 (MDN)</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: white;
        }

        h1 {
            font-size: 30px;
            margin-bottom: 25px;
        }

        .ex {
            margin-bottom: 50px;
        }

        p {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
            border: none;
            background: #2d6cdf;
            color: white;
            cursor: pointer;
            border-radius: 6px;
            margin-right: 10px;
        }

        button:hover {
            background: #1b4fb3;
        }

        code {
            display: block;
            margin-top: 10px;
            background: #f2f2f2;
            padding: 10px;
            min-height: 20px;
        }
    </style>

    <script>
        function setCookies() {
            document.cookie = "name=Oeschger; SameSite=Lax";
            document.cookie = "favorite_food=tripe; SameSite=Lax";
        }

        function showCookies() {
            document.getElementById("out1").textContent = document.cookie;
        }

        function clear1() {
            document.getElementById("out1").textContent = "";
        }

        function checkCookie() {
            const exists = document.cookie
                .split("; ")
                .find(row => row.startsWith("name="));

            document.getElementById("out2").textContent =
                exists ? "Cookie 'name' există" : "Cookie 'name' NU există";
        }

        function clear2() {
            document.getElementById("out2").textContent = "";
        }

        function getValue() {
            const value = document.cookie
                .split("; ")
                .find(row => row.startsWith("favorite_food="))
                ?.split("=")[1];

            document.getElementById("out3").textContent =
                "favorite_food = " + value;
        }

        function clear3() {
            document.getElementById("out3").textContent = "";
        }

        function deleteCookie() {
            document.cookie = "name=; expires=Thu, 01 Jan 1970 00:00:00 GMT; SameSite=Lax";
            document.cookie = "favorite_food=; expires=Thu, 01 Jan 1970 00:00:00 GMT; SameSite=Lax";
        }
    </script>
</head>

<body>

<h1>Ex 5 (MDN style)</h1>

<div class="ex">
    <p>Exemplul 1 - Set Cookies</p>
    <button onclick="setCookies()">Rulează</button>
</div>

<div class="ex">
    <p>Exemplul 2 - Afișare Cookies</p>
    <button onclick="showCookies()">Rulează</button>
    <button onclick="clear1()">Clear</button>
    <code id="out1"></code>
</div>

<div class="ex">
    <p>Exemplul 3 - Verificare cookie</p>
    <button onclick="checkCookie()">Rulează</button>
    <button onclick="clear2()">Clear</button>
    <code id="out2"></code>
</div>

<div class="ex">
    <p>Exemplul 4 - Citire valoare cookie</p>
    <button onclick="getValue()">Rulează</button>
    <button onclick="clear3()">Clear</button>
    <code id="out3"></code>
</div>

<div class="ex">
    <p>Exemplul 5 - Ștergere cookies</p>
    <button onclick="deleteCookie()">Rulează</button>
</div>

</body>
</html>
