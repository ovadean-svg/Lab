<!DOCTYPE html>
<html>
<head>
    <title>Ex 5 (MDN)</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f8;
        }

        header {
            background: #2d6cdf;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        .container {
            padding: 30px;
            max-width: 900px;
            margin: auto;
        }

        .ex {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
        }

        .ex p {
            margin: 0 0 10px 0;
            font-weight: bold;
        }

        button {
            padding: 10px;
            width: 100%;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #2d6cdf;
            color: white;
            font-size: 14px;
            transition: 0.2s;
        }

        button:hover {
            background: #1b4fb3;
        }
    </style>

    <script>
        function setCookie() {
            document.cookie = "user=student; path=/";
            alert("Cookie setat!");
        }

        function setCookieExpire() {
            const d = new Date();
            d.setTime(d.getTime() + (24*60*60*1000));
            document.cookie = "expiresCookie=test; expires=" + d.toUTCString() + "; path=/";
            alert("Cookie cu expirare setat!");
        }

        function getCookies() {
            alert("Cookie-uri: " + document.cookie);
        }

        function updateCookie() {
            document.cookie = "user=updatedStudent; path=/";
            alert("Cookie modificat!");
        }

        function deleteCookie() {
            document.cookie = "user=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            alert("Cookie șters!");
        }
    </script>
</head>

<body>

<header>
    Ex 5 (MDN) - Document.cookie
</header>

<div class="container">

    <div class="ex">
        <p>Exemplul 1 - Set Cookie</p>
        <button onclick="setCookie()">Rulează</button>
    </div>

    <div class="ex">
        <p>Exemplul 2 - Cookie cu expirare</p>
        <button onclick="setCookieExpire()">Rulează</button>
    </div>

    <div class="ex">
        <p>Exemplul 3 - Afișare Cookies</p>
        <button onclick="getCookies()">Rulează</button>
    </div>

    <div class="ex">
        <p>Exemplul 4 - Modificare Cookie</p>
        <button onclick="updateCookie()">Rulează</button>
    </div>

    <div class="ex">
        <p>Exemplul 5 - Ștergere Cookie</p>
        <button onclick="deleteCookie()">Rulează</button>
    </div>

</div>

</body>
</html>
