<!DOCTYPE html>
<html>
<head>
    <title>Ex 5 (MDN)</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: white;
        }

        h1 {
            font-size: 30px;
            margin-bottom: 25px;
        }

        .ex {
            margin-bottom: 50px; 
        }

        p {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
            border: none;
            background: #2d6cdf;
            color: white;
            cursor: pointer;
            border-radius: 6px;
            margin-right: 10px;
        }

        button:hover {
            background: #1b4fb3;
        }

        code {
            display: block;
            margin-top: 10px;
            background: #f2f2f2;
            padding: 10px;
        }
    </style>

    <script>
        // SET cookie
        function setCookies() {
            document.cookie = "name=Oeschger; SameSite=Lax";
            document.cookie = "favorite_food=tripe; SameSite=Lax";
        }

        // SHOW all cookies (MDN style)
        function showCookies() {
            document.getElementById("output1").textContent = document.cookie;
        }

        // CHECK specific cookie (MDN style)
        function checkCookie() {
            const exists = document.cookie
                .split("; ")
                .find(row => row.startsWith("name="));

            document.getElementById("output2").textContent =
                exists ? "Cookie 'name' există" : "Cookie 'name' NU există";
        }

        // GET specific value (MDN style)
        function getValue() {
            const value = document.cookie
                .split("; ")
                .find(row => row.startsWith("favorite_food="))
                ?.split("=")[1];

            document.getElementById("output3").textContent =
                "Valoare favorite_food = " + value;
        }

        // DELETE cookie
        function deleteCookie() {
            document.cookie = "name=; expires=Thu, 01 Jan 1970 00:00:00 GMT; SameSite=Lax";
            document.cookie = "favorite_food=; expires=Thu, 01 Jan 1970 00:00:00 GMT; SameSite=Lax";
        }
    </script>
</head>

<body>

<h1>Ex 5 (MDN style)</h1>

<div class="ex">
    <p>Exemplul 1 - Set cookies</p>
    <button onclick="setCookies()">Set Cookies</button>
</div>

<div class="ex">
    <p>Exemplul 2 - Afișare toate cookies</p>
    <button onclick="showCookies()">Show cookies</button>
    <code id="output1"></code>
</div>

<div class="ex">
    <p>Exemplul 3 - Verificare existență cookie</p>
    <button onclick="checkCookie()">Check cookie</button>
    <code id="output2"></code>
</div>

<div class="ex">
    <p>Exemplul 4 - Citire valoare cookie</p>
    <button onclick="getValue()">Get value</button>
    <code id="output3"></code>
</div>

<div class="ex">
    <p>Exemplul 5 - Ștergere cookies</p>
    <button onclick="deleteCookie()">Delete cookies</button>
</div>

</body>
</html>
