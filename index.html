<!DOCTYPE html>
<html>
<head>
    <title>Ex 5 (MDN)</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 25px;
            background: white;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 25px;
        }

        .ex {
            margin-bottom: 60px;
        }

        p {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .btn {
            padding: 10px 15px;
            font-size: 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px;
        }

        .run {
            background: #2d6cdf;
            color: white;
        }

        .run:hover {
            background: #1b4fb3;
        }

        .clear {
            background: #555;
            color: white;
        }

        .clear:hover {
            background: #333;
        }

        code {
            display: block;
            margin-top: 10px;
            padding: 10px;
            background: #f2f2f2;
            min-height: 20px;
        }
    </style>

    <script>
        function setCookies() {
            document.cookie = "name=Oeschger; SameSite=Lax";
            document.cookie = "favorite_food=tripe; SameSite=Lax";

            // 👇 afișare imediată (asta e ce ai cerut)
            document.getElementById("out1").textContent = document.cookie;
        }

        function showCookies() {
            document.getElementById("out1").textContent = document.cookie;
        }

        function clear1() {
            document.getElementById("out1").textContent = "";
        }

        function checkCookie() {
            const exists = document.cookie
                .split("; ")
                .find(row => row.startsWith("name="));

            document.getElementById("out2").textContent =
                exists ? "Cookie 'name' există" : "Cookie 'name' NU există";
        }

        function clear2() {
            document.getElementById("out2").textContent = "";
        }

        function getValue() {
            const value = document.cookie
                .split("; ")
                .find(row => row.startsWith("favorite_food="))
                ?.split("=")[1];

            document.getElementById("out3").textContent =
                "favorite_food = " + value;
        }

        function clear3() {
            document.getElementById("out3").textContent = "";
        }

        function deleteCookie() {
            document.cookie = "name=; expires=Thu, 01 Jan 1970 00:00:00 GMT; SameSite=Lax";
            document.cookie = "favorite_food=; expires=Thu, 01 Jan 1970 00:00:00 GMT; SameSite=Lax";

            document.getElementById("out1").textContent = "";
        }
    </script>
</head>

<body>

<h1>Ex 5 (MDN)</h1>

<div class="ex">
    <p>Exemplul 1 - Set Cookies</p>
    <button class="btn run" onclick="setCookies()">Run</button>
    <button class="btn clear" onclick="clear1()">Clear</button>
    <code id="out1"></code>
</div>

<div class="ex">
    <p>Exemplul 2 - Afișare Cookies</p>
    <button class="btn run" onclick="showCookies()">Run</button>
    <button class="btn clear" onclick="clear2()">Clear</button>
    <code id="out2"></code>
</div>

<div class="ex">
    <p>Exemplul 3 - Verificare Cookie</p>
    <button class="btn run" onclick="checkCookie()">Run</button>
    <button class="btn clear" onclick="clear2()">Clear</button>
    <code id="out2"></code>
</div>

<div class="ex">
    <p>Exemplul 4 - Citire valoare Cookie</p>
    <button class="btn run" onclick="getValue()">Run</button>
    <button class="btn clear" onclick="clear3()">Clear</button>
    <code id="out3"></code>
</div>

<div class="ex">
    <p>Exemplul 5 - Ștergere Cookies</p>
    <button class="btn run" onclick="deleteCookie()">Run</button>
</div>

</body>
</html>
