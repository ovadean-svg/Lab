<!DOCTYPE html>
<html>
<head>
    <title>Ex 5 (MDN)</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 20px;
        }

        button {
            display: block;
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #2d6cdf;
            color: white;
            font-size: 14px;
            transition: 0.2s;
        }

        button:hover {
            background: #1b4fb3;
        }
    </style>

    <script>
        function setCookie() {
            document.cookie = "user=student; path=/";
            alert("Cookie setat!");
        }

        function setCookieExpire() {
            const d = new Date();
            d.setTime(d.getTime() + (24*60*60*1000));
            document.cookie = "expiresCookie=test; expires=" + d.toUTCString() + "; path=/";
            alert("Cookie cu expirare setat!");
        }

        function getCookies() {
            alert("Cookie-uri: " + document.cookie);
        }

        function updateCookie() {
            document.cookie = "user=updatedStudent; path=/";
            alert("Cookie modificat!");
        }

        function deleteCookie() {
            document.cookie = "user=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            alert("Cookie șters!");
        }
    </script>
</head>

<body>
    <div class="container">
        <h1>Ex 5 (MDN)</h1>

        <button onclick="setCookie()">Set Cookie</button>
        <button onclick="setCookieExpire()">Set Cookie cu expirare</button>
        <button onclick="getCookies()">Afișează Cookies</button>
        <button onclick="updateCookie()">Modifică Cookie</button>
        <button onclick="deleteCookie()">Șterge Cookie</button>
    </div>
</body>
</html>
